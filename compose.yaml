services:
  db:
    image: 'postgres:17'
    container_name: chess-db
    restart: unless-stopped
    environment:
      - 'POSTGRES_DB=chess'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=peaceful'
      - 'POSTGRES_INITDB_ARGS=-c client_encoding=UTF8'
    ports:
      - '5433:5432'
    volumes:
      - live-chess-ratings_postgres_data:/var/lib/postgresql/data
  backend:
    image: 'live-chess-ratings:latest'
    container_name: chess-backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - '8080:8080'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/chess'
      - 'SPRING_DATASOURCE_USERNAME=peaceful'
      - 'SPRING_DATASOURCE_PASSWORD=secret'
volumes:
  live-chess-ratings_postgres_data:
      external: true